<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPL S3 FINAL COUNTDOWN</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 Animated Background -->
<div class="bg-animation"></div>

<!-- 🏟 Main Container -->
<div class="main">

    <!-- 🏆 Title -->
    <h1 class="title">
        <span class="glow">PPL SEASON 3</span><br>
        <span class="final">GRAND FINAL</span>
    </h1>

    <!-- ⚡ Match Banner -->
    <div class="match-banner">

        <!-- Team SC -->
        <div class="team-box sc-box">
            <div class="team-name">SIDDHANT CHALLENGERS</div>
            <div class="team-short">SC</div>
        </div>

        <!-- VS -->
        <div class="vs-circle">VS</div>

        <!-- Team PI -->
        <div class="team-box pi-box">
            <div class="team-name">PRABAL INDIANS</div>
            <div class="team-short">PI</div>
        </div>

    </div>

    <!-- ⏳ Countdown -->
    <div id="countdown">

        <div class="time-box">
            <span id="days">00</span>
            <p>DAYS</p>
        </div>

        <div class="time-box">
            <span id="hours">00</span>
            <p>HOURS</p>
        </div>

        <div class="time-box">
            <span id="minutes">00</span>
            <p>MINUTES</p>
        </div>

        <div class="time-box">
            <span id="seconds">00</span>
            <p>SECONDS</p>
        </div>

    </div>

    <!-- 💥 Final Message -->
    <div id="finalMessage" class="hidden">
        <div class="final-text">
            🔥 THE FINAL HAS BEGUN 🔥
        </div>
        <div class="sub-text">
            LET THE WAR START 💀
        </div>
    </div>

</div>

<!-- 🔊 Sound -->
<audio id="boomSound" src="https://www.soundjay.com/explosion/explosion-01.mp3"></audio>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
